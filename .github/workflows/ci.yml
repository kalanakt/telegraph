name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/telegraph_ci
      REDIS_URL: redis://localhost:6379
      ENCRYPTION_KEY: ci_encryption_key_32_chars_minimum
      TELEGRAM_WEBHOOK_BASE_URL: https://example.com/api/telegram/webhook
      NEXT_PUBLIC_SITE_URL: https://example.com
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_WEBHOOK_SIGNING_SECRET: whsec_ci
      CLERK_BILLING_PRO_PLAN_SLUGS: pro
      S3_ENDPOINT: https://example.com
      S3_BUCKET: telegraph-ci
      S3_REGION: auto
      S3_ACCESS_KEY_ID: ci-access-key
      S3_SECRET_ACCESS_KEY: ci-secret-key
      S3_PUBLIC_URL: https://cdn.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repo
        run: pnpm ci:verify
